<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>daniel yang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet"
        media="print"
        onload="this.media='all'"
    >
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 48px;
        }

        main {
            width: 100%;
            max-width: 920px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .name {
            font-family: "Playfair Display", serif;
            font-size: clamp(36px, 8vw, 60px);
            font-weight: 700;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1500ms ease forwards;
        }

        .links-container {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1000ms ease 500ms forwards;
        }

        .links {
            display: flex;
            gap: 8px;
            font-size: 14px;
            justify-content: center;
            margin: 8px;
        }

        .links a {
            text-decoration: none;
            color: #000;
            padding: 8px 10px;
            font-weight: 600;
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 10px;
            right: 10px;
            height: 1px;
            background: #000;
            transform: scaleX(0);
            transition: transform 300ms ease;
        }

        .links a:hover::after {
            transform: scaleX(1);
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 10px;
        }

        @media (max-width: 520px) {
            .links {
                gap: 6px;
                flex-wrap: wrap;
                font-size: 13px;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <main>
        <h1 class="name">daniel yang</h1>

        <div class="links-container">
            <div class="links">
                <a href="https://github.com/danielwzyang">github</a>
                <a href="mailto:daniel.yang@cooper.edu">email</a>
                <!-- <a href="/projects">projects</a> -->
            </div>

            <p class="subtitle">stuy '26 | cooper '30</p>
        </div>
    </main>

    <script>
        document.querySelectorAll(`a[href^="http"]`).forEach(a => {
            a.target = "_blank"
            a.rel = "noopener noreferrer"
        })
    </script>
</body>

</html>
